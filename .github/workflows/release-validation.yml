name: Release Validation

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ make

      - name: Validate tag matches CMake project version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME}"
          project_version="$(python3 - <<'PY'
import re

with open('CMakeLists.txt', 'r', encoding='utf-8') as f:
    content = f.read()

match = re.search(r'project\s*\(\s*subcli\s+VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)\b', content, re.IGNORECASE)
print(match.group(1) if match else '')
PY
          )"

          if [ -z "$project_version" ]; then
            echo "Failed to read subcli project version from CMakeLists.txt"
            exit 1
          fi

          expected_tag="v${project_version}"
          if [ "$tag" != "$expected_tag" ]; then
            echo "Tag/version mismatch: got ${tag}, expected ${expected_tag}"
            exit 1
          fi

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: cmake --build build --target package

      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: subcli-package
          path: build/subcli-*.tar.gz
